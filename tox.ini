[tox]
envlist = lint, py312, frontend-lint
skipsdist = true

[testenv:lint]
deps =
    ruff
commands =
    ruff check dev-sdk dev-cli dev-server pr-comments

[testenv:py312]
allowlist_externals = sh
deps =
    pytest
    pytest-cov
    httpx
commands =
    pip install -e pr-comments -e dev-sdk -e dev-cli -e dev-server
    sh -c 'cd pr-comments && pytest tests -v'
    sh -c 'cd dev-sdk && pytest tests -v'
    sh -c 'cd dev-cli && pytest tests -v'
    sh -c 'cd dev-server && pytest tests -v'

[testenv:frontend-lint]
changedir = dev-frontend
skip_install = true
allowlist_externals = npm
commands =
    npm install --no-audit --no-fund
    npm run lint
