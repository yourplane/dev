[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dev"
version = "0.1.0"
description = "CLI tool for managing AI developer tasks with Cursor agent integration"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
    { name = "Developer" }
]
dependencies = [
    "click>=8.0",
]

[project.optional-dependencies]
dev = [
    "tox>=4.0",
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[project.scripts]
dev = "dev.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]